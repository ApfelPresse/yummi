<!doctype html>
<html lang="de">
<head>
  <script>
    const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname === '';
    const baseHref = isLocal ? '/' : '/yummi/';
    document.write(`<base href="${baseHref}" />`);
  </script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rezept</title>
  <link rel="icon" href="./favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="./logo.png" />
  <link rel="apple-touch-icon" href="./logo.png" />
  <script src="./js/core/tailwind-theme.js"></script>
  <script src="./js/tialwind_3.4.17.js"></script>
  <style>
    @media (max-width: 420px) {
      html { font-size: 14px; }
    }
  </style>
</head>

<body class="bg-surface-page text-gray-900">
  <header class="bg-white shadow-sm sticky top-0 z-20">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="index.html" class="text-sm font-medium text-gray-700 hover:text-gray-900">← Zurück</a>
      <div class="flex items-center gap-2">
        <a id="editLink"
           class="px-3 py-1.5 rounded-lg bg-gray-200 hover:bg-gray-300 text-sm"
           href="#">
          Bearbeiten
        </a>
        <button id="btnShareRecipe" class="px-3 py-1.5 rounded-lg bg-gray-200 hover:bg-gray-300 text-sm">Teilen</button>
        <button id="btnToggleMode"
          class="px-3 py-1.5 rounded-lg bg-brand-ink text-white hover:bg-brand-ink-hover text-sm">
          Pantry bearbeiten
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-6">
    <div id="errorBox" class="hidden mb-5 p-4 rounded-2xl bg-red-50 border border-red-200 text-sm text-semantic-danger-strong"></div>
    <div id="content"></div>
  </main>

  <!-- Loading Spinner -->
  <div id="loadingOverlay" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-8 text-center shadow-xl">
      <div class="inline-block mb-4">
        <div class="w-12 h-12 border-4 border-gray-300 border-t-blue-600 rounded-full animate-spin"></div>
      </div>
      <div id="loadingProgress" class="text-gray-700">Rezept wird geladen...</div>
    </div>
  </div>

  <script type="module">
    import {
      getRecipeFromCache,
      getRecipeImageUrl,
      isAuthenticated,
      showError,
      hideError,
      showLoading,
      hideLoading,
      normalizeIngredient,
      getIgnoredIngredients,
      escapeHtml,
      getUrlParam
    } from "./js/core/shared.js";
    import { compressStringToBase64 } from "./js/utils/helpers.js";
    import { loadSelected, saveSelected } from "./js/storage/local.js";
    import { applyIgnoredFromLocal, syncIgnoredFromDav, getCredsOrThrow } from "./js/ignore/ignore.js";
    import { aggregateRecipeNutrition, renderNutritionSummary, setupNutritionCardListeners } from "./js/recipes/nutrition-aggregator.js";

    const STORAGE_KEY = "pantry_selected_v1";
    let pantryEdit = false;

    function fmtIngredient(i) {
      const qty = [i.amount, i.unit].filter(v => v !== null && v !== undefined && v !== "").join(" ");
      const opt = i.optional ? " (optional)" : "";
      const note = i.note ? ` – ${escapeHtml(i.note)}` : "";
      return `${qty ? qty + " " : ""}${escapeHtml(i.name)}${opt}${note}`;
    }

    async function render(recipe) {
      const selected = loadSelected();

      const groups = new Map();
      for (const ing of recipe.ingredients || []) {
        if (!ing || !ing.name) continue;

        const section = ing.section || "Zutaten";
        if (!groups.has(section)) groups.set(section, []);
        groups.get(section).push(ing);
      }

      // Bild von Cache laden
      const imgSrc = await getRecipeImageUrl(recipe.id);

      document.getElementById("content").innerHTML = `
        <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
          <img src="${imgSrc}" class="w-full h-48 object-cover" alt="${escapeHtml(recipe.title)}" />

          <div class="p-6">
            <h1 class="text-2xl font-semibold">${escapeHtml(recipe.title)}</h1>
            <p class="text-gray-700 mt-2">${escapeHtml(recipe.description || "")}</p>

            <div class="mt-6 grid gap-6 lg:grid-cols-2">
              <section class="bg-gray-50 rounded-2xl p-4 border">
                <h2 class="text-lg font-semibold mb-3">Zutaten</h2>
                <ul id="ingredientsList" class="space-y-2"></ul>
              </section>

              <section class="bg-white rounded-2xl p-4 border">
                <h2 class="text-lg font-semibold mb-3">Zubereitung</h2>
                <ol class="space-y-3">
                  ${(recipe.steps || []).map((s,i)=>`
                    <li class="flex gap-3 items-start">
                      <div class="w-7 h-7 rounded-full bg-brand-ink text-white flex items-center justify-center text-xs" style="min-width: 30px;">${i+1}</div>
                      <div>
                        ${s.title ? `<div class="font-medium">${escapeHtml(s.title)}</div>` : ""}
                        <div class="text-gray-700">${escapeHtml(s.text || "")}</div>
                      </div>
                    </li>`).join("")}
                </ol>
              </section>
            </div>

            <!-- Nährstoffzusammenfassung (Accordion) -->
            <section class="mt-6 bg-white rounded-2xl border overflow-hidden" id="nutritionSection">
              <button id="btnToggleNutrition" class="w-full px-4 py-4 flex items-center justify-between hover:bg-gray-50 transition cursor-pointer">
                <h2 class="text-lg font-semibold">Nährstoffzusammenfassung</h2>
                <svg id="nutritionChevron" class="w-5 h-5 text-gray-400 transition transform" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
                </svg>
              </button>
              <div id="nutritionBody" class="hidden px-4 pb-4 bg-gray-50 border-t">
                <div id="nutritionContent" class="text-center text-gray-500 text-sm py-4">
                  <div class="inline-block">
                    <div class="w-6 h-6 border-3 border-gray-300 border-t-blue-600 rounded-full animate-spin mb-2"></div>
                  </div>
                  <p>Nährstoffe werden berechnet...</p>
                </div>
              </div>
            </section>
          </div>
        </div>
      `;

      const ul = document.getElementById("ingredientsList");
      ul.innerHTML = "";

      for (const [section, items] of groups) {
        const h = document.createElement("li");
        h.innerHTML = `<div class="text-xs font-semibold uppercase text-gray-600 pt-2">${escapeHtml(section)}</div>`;
        ul.appendChild(h);

        const ignoredSet = getIgnoredIngredients();
        for (const ing of items) {
          const key = normalizeIngredient(ing.name);
          const have = selected.has(key);
          const isIgnored = ignoredSet.has(key);

          const li = document.createElement("li");
          const bgClass = isIgnored
            ? "bg-gray-50 border-gray-200"
            : have
            ? "bg-green-50 border-green-200"
            : "bg-red-50 border-red-200";
          li.className =
            "flex justify-between items-center p-2 rounded-lg border " + bgClass;

          li.innerHTML = `
            <span class="text-sm">${fmtIngredient(ing)}</span>
            <span class="text-xs">${have ? "✔" : "✖"}</span>
          `;

          if (pantryEdit) {
            li.classList.add("cursor-pointer");
            li.onclick = () => {
              const sel = loadSelected();
              if (sel.has(key)) sel.delete(key);
              else sel.add(key);
              saveSelected(sel);
              render(recipe);
            };
          }

          ul.appendChild(li);
        }
      }

      // ──── Nährstoffzusammenfassung ────────────────────────────────────────
      const btnToggleNutrition = document.getElementById("btnToggleNutrition");
      const nutritionBody = document.getElementById("nutritionBody");
      const nutritionChevron = document.getElementById("nutritionChevron");
      const nutritionContent = document.getElementById("nutritionContent");

      let nutritionExpanded = false;
      btnToggleNutrition.onclick = () => {
        nutritionExpanded = !nutritionExpanded;
        nutritionBody.classList.toggle("hidden");
        nutritionChevron.style.transform = nutritionExpanded ? "rotate(180deg)" : "rotate(0deg)";
      };

      // Lade Nährstoffe asynchron
      (async () => {
        try {
          let creds = null;
          try {
            creds = getCredsOrThrow();
          } catch {
            // Offline - Nährstoffe laden trotzdem aus Cache
          }

          const aggregated = await aggregateRecipeNutrition(recipe, creds);
          if (aggregated) {
            const html = renderNutritionSummary(aggregated);
            nutritionContent.innerHTML = html;
            
            // Setze Click-Handler für Nährstoff-Kärtchen
            setupNutritionCardListeners(aggregated);
          } else {
            nutritionContent.innerHTML = '<p class="text-gray-500 text-sm">Keine Nährstoffdaten verfügbar</p>';
          }
        } catch (err) {
          console.error("Fehler beim Laden der Nährstoffe:", err);
          nutritionContent.innerHTML = '<p class="text-red-500 text-sm">Fehler beim Laden der Nährstoffe</p>';
        }
      })();
    }

    document.getElementById("btnToggleMode").onclick = () => {
      pantryEdit = !pantryEdit;
      document.getElementById("btnToggleMode").textContent =
        pantryEdit ? "Pantry fertig" : "Pantry bearbeiten";
      boot();
    };

    async function boot() {
      try {
        // Versuche, das Rezept schon jetzt aus dem Cache zu laden, damit der Teilen-Button
        // sofort funktioniert (auch wenn der Nutzer nicht eingeloggt ist).
        const recipeId = getUrlParam("id");
        let preloadedRecipe = null;
        if (recipeId) {
          try {
            preloadedRecipe = await getRecipeFromCache(recipeId);
          } catch (err) {
            console.warn('Preload recipe failed:', err);
            preloadedRecipe = null;
          }
        }

        // Share-Button initialisieren (sofern wir das Rezept aus dem Cache haben)
        const elEditLink = document.getElementById("editLink");
        if (elEditLink && recipeId) elEditLink.href = `edit.html?id=${encodeURIComponent(recipeId)}`;
        const btnShare = document.getElementById('btnShareRecipe');
        if (btnShare) {
          btnShare.addEventListener('click', async (e) => {
            e.preventDefault();
            try {
              const recipeToShare = preloadedRecipe || (recipeId ? await getRecipeFromCache(recipeId) : null);
              if (!recipeToShare) throw new Error('Rezept nicht im Cache vorhanden');
              const token = await compressStringToBase64(JSON.stringify(recipeToShare));
              const shareUrl = new URL(`edit.html?recipe=${encodeURIComponent(token)}`, window.location.href).toString();
              await navigator.clipboard.writeText(shareUrl);
              const orig = btnShare.textContent;
              btnShare.textContent = '✅';
              setTimeout(() => { btnShare.textContent = orig; }, 1500);
            } catch (err) {
              console.error('Share failed', err);
              btnShare.textContent = '⚠';
              setTimeout(() => { btnShare.textContent = 'Teilen'; }, 1500);
            }
          });
        }

        applyIgnoredFromLocal();
        try {
          const creds = getCredsOrThrow();
          await syncIgnoredFromDav(creds);
        } catch (err) {
          console.warn("Ignore-Liste Sync fehlgeschlagen:", err.message || err);
        }

        showLoading("Rezept wird geladen...");

        // Falls wir das Rezept schon vorgeladen haben, nutzen wir es, ansonsten laden wir es jetzt.
        const finalRecipeId = getUrlParam("id");
        if (!finalRecipeId) throw new Error("Keine Rezept-ID in URL");
        const recipe = preloadedRecipe || await getRecipeFromCache(finalRecipeId);
        if (!recipe) throw new Error("Rezept nicht gefunden");

        // Normalisieren falls nötig
        const sel = loadSelected();
        saveSelected(sel);

        await render(recipe);
        hideLoading();
      } catch (e) {
        hideLoading();
        showError(`❌ ${e.message}`);
        console.error(e);
      }
    }

    boot();
  </script>

  <!-- Version (ganz unten wie auf index.html) -->
  <div class="mt-8 mb-2 text-center text-xs text-gray-500">
    Version: <span id="appVersion">?</span>
  </div>

  <script type="module">
    import { APP_VERSION } from "./js/core/version.js";
    document.getElementById("appVersion").textContent = APP_VERSION;
  </script>
  <script type="module" src="./js/core/sw-register.js"></script>
</body>
</html>
