<!doctype html>
<html lang="de">
<head>
  <script>
    const isLocal = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.hostname === "";
    const baseHref = isLocal ? "/" : "/yummi/";
    document.write(`<base href="${baseHref}" />`);
  </script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Essensplan</title>
  <link rel="icon" href="./favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="./logo.png" />
  <link rel="apple-touch-icon" href="./logo.png" />
  <script src="./js/core/tailwind-theme.js"></script>
  <script src="./js/tialwind_3.4.17.js"></script>
</head>
<body class="bg-surface-page text-gray-900">
  <header class="sticky top-0 z-20 bg-surface-page border-b-2 border-black">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="index.html" class="text-sm font-medium text-gray-700 hover:text-gray-900">← Zurück</a>
    </div>
  </header>

  <main class="max-w-4xl mx-auto pb-8">
    <section class="px-4 py-5">
      <h1 class="text-5xl font-semibold tracking-tight">Essensplan</h1>
      <div class="mt-5 rounded-2xl border border-gray-200 bg-white shadow-sm overflow-hidden">
        <button id="personalSettingsToggle" type="button" class="w-full px-4 py-3 text-sm font-semibold text-gray-900 bg-gray-50 border-b border-gray-200 flex items-center justify-between text-left">
          <span>Persönliche Einstellungen</span>
          <span id="personalSettingsChevron" class="text-base leading-none text-gray-600">▴</span>
        </button>
        <div id="personalSettingsBody" class="px-4 py-3 grid gap-2">
          <select id="populationGroupSelect" class="rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-300"></select>
          <div class="rounded-lg border border-gray-300 bg-white px-3 py-2">
            <div class="flex items-center justify-between text-sm">
              <label for="bodyWeightRange" class="text-gray-700">Körpergewicht</label>
              <span id="bodyWeightValue" class="font-semibold text-gray-900">70 kg</span>
            </div>
            <input id="bodyWeightRange" type="range" min="0" max="200" step="1" value="70" class="mt-2 w-full" />
          </div>
          <select id="sexSelect" class="rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-300"></select>
          <select id="palEnergySelect" class="rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-300"></select>
        </div>
      </div>

      <div id="referenceNutrientMultiSelect" class="mt-2 rounded-2xl border border-gray-200 bg-white shadow-sm overflow-hidden"></div>
    </section>

    <div id="planRoot" class="space-y-0"></div>

    <div id="emptyState" class="hidden px-4 py-8 text-center text-gray-700">
      Noch keine Rezepte ausgewählt. Wähle in der Startseite Rezepte per Longpress, Rechtsklick oder Plus-Icon aus.
    </div>
  </main>

  <script type="module" src="./js/meal-plan/app.js"></script>
</body>
</html>
