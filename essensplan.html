<!doctype html>
<html lang="de">
<head>
  <script>
    const isLocal = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.hostname === "";
    const baseHref = isLocal ? "/" : "/yummi/";
    document.write(`<base href="${baseHref}" />`);
  </script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Essensplan</title>
  <link rel="icon" href="./favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="./logo.png" />
  <link rel="apple-touch-icon" href="./logo.png" />
  <script src="./js/tialwind_3.4.17.js"></script>
</head>
<body class="bg-stone-100 text-gray-900">
  <header class="sticky top-0 z-20 bg-stone-100 border-b-2 border-black">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="index.html" class="text-sm font-medium text-gray-700 hover:text-gray-900">← Zurück</a>
    </div>
  </header>

  <main class="max-w-4xl mx-auto pb-8">
    <section class="px-4 py-5 border-b-2 border-black">
      <h1 class="text-5xl font-semibold tracking-tight">Essensplan</h1>
      <p id="todayHeadline" class="mt-6 text-3xl font-semibold"></p>
      <div class="mt-5 grid gap-2">
        <select id="populationGroupSelect" class="rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm"></select>
        <select id="sexSelect" class="rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm"></select>
        <div id="referenceNutrientMultiSelect" class="relative"></div>
      </div>
    </section>

    <div id="planRoot" class="space-y-0"></div>

    <div id="emptyState" class="hidden px-4 py-8 text-center text-gray-700">
      Noch keine Rezepte ausgewählt. Wähle in der Startseite Rezepte per Longpress, Rechtsklick oder Plus-Icon aus.
    </div>
  </main>

  <script type="module" src="./js/meal-plan/app.js"></script>
</body>
</html>
